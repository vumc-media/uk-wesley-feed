<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UK Wesley Facebook Feed</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f8;
}

/* Full-width section */
.section{
  width:100%;
  padding:20px 12px;
  box-sizing:border-box;
}

/* Centered content with wide max */
.container{
  max-width:1100px;
  margin:auto;
}

/* Header */
.header{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-bottom:16px;
  color:#111;
}

/* Facebook wrapper */
.fb-wrapper{
  width:100%;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

/* Responsive iframe */
.fb-wrapper iframe{
  width:100%;
  height:720px;
  border:none;
}

/* Button */
.btn-wrap{
  text-align:center;
  margin-top:14px;
}

.btn{
  display:inline-block;
  padding:12px 18px;
  background:#1877f2;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  font-size:15px;
}

/* Mobile tweaks */
@media (max-width:600px){
  .header{
    font-size:20px;
  }
  .fb-wrapper iframe{
    height:650px;
  }
}
</style>
</head>

<body>

<div class="section">
  <div class="container">

    <div class="header">
      Stay Connected with UK Wesley
    </div>

    <div class="fb-wrapper">
      <iframe 
        src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/ukywesley&tabs=timeline&width=1100&height=720&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
        loading="lazy">
      </iframe>
    </div>

    <div class="btn-wrap">
      <a href="https://www.facebook.com/ukywesley" target="_blank" class="btn">
        View Full Facebook Page
      </a>
    </div>

  </div>
</div>

</body>
</html>
