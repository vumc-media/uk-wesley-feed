<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UK Wesley Feed</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f8;
}

/* Container */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* Header */
.header{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
  color:#111;
}

/* Facebook iframe */
.fb-wrapper{
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

iframe{
  width:100%;
  height:700px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    Stay Connected with UK Wesley
  </div>

  <div class="fb-wrapper">
    <iframe 
      src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/ukywesley&tabs=timeline&width=500&height=700&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
      loading="lazy">
    </iframe>
  </div>

</div>

</body>
</html>
