<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Wesley Facebook Feed</title>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#f4f6f8;
      color:#111;
    }

    .section{
      width:100%;
      padding:20px 14px;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:0 auto;
    }

    .header{
      text-align:center;
      font-size:24px;
      font-weight:700;
      margin-bottom:16px;
    }

    .fb-wrapper{
      width:100%;
      min-height:760px;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      background:#fff;
    }

    .fb-wrapper iframe{
      display:block;
      width:100%;
      height:760px;
      border:none;
    }

    .btn-wrap{
      text-align:center;
      margin-top:14px;
    }

    .btn{
      display:inline-block;
      padding:12px 18px;
      background:#1877f2;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-weight:700;
    }

    @media (max-width: 640px){
      .header{
        font-size:20px;
      }

      .fb-wrapper{
        min-height:680px;
      }

      .fb-wrapper iframe{
        height:680px;
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="header">Stay Connected with UK Wesley</div>

      <div class="fb-wrapper">
        <iframe
          src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fukywesley&tabs=timeline&height=760&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true&appId"
          allowfullscreen="true"
          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
      </div>

      <div class="btn-wrap">
        <a class="btn" href="https://www.facebook.com/ukywesley" target="_blank" rel="noopener">
          View Full Facebook Page
        </a>
      </div>
    </div>
  </section>
</body>
</html>
